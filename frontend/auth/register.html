<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - EulerEngine</title>
    <link rel="stylesheet" href="../global/global.css">
    <link rel="stylesheet" href="auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">EulerEngine</div>
        <div class="nav-links" id="nav-links">
            <div id="auth-nav-links"></div>
        </div>
    </nav>
    <div class="background">
        <div class="shape"></div>
        <div class="shape"></div>
    </div>
    <div class="container">
        <div class="form-box" id="register-box">
            <h2>Join Us</h2>
            <p>Create your EulerEngine account</p>
            <form id="register-form">
                <div class="input-group">
                    <input type="text" id="reg-username" required placeholder=" ">
                    <label>Username</label>
                </div>
                <div class="input-group">
                    <input type="email" id="reg-email" required placeholder=" ">
                    <label>Email</label>
                </div>
                <div class="input-group">
                    <input type="password" id="reg-password" required placeholder=" ">
                    <label>Password</label>
                </div>
                <button type="submit" class="btn" id="reg-btn">
                    <span>Register</span>
                    <div class="loader"></div>
                </button>
            </form>
            <div class="switch">
                Already have an account? <a href="login.html">Login here</a>
            </div>
            <div class="message" id="register-message"></div>
        </div>
    </div>
    <script src="../global/global.js"></script>
    <script src="register.js"></script>
</body>
</html>
