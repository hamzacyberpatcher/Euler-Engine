<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Registration - EulerEngine</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="home-body">
    <div class="background home-bg">
        <div class="shape"></div>
        <div class="shape"></div>
    </div>
    
    <nav class="navbar">
        <div class="nav-brand">EulerEngine</div>
        <div class="nav-links" id="nav-links">
            <div id="auth-nav-links"></div>
        </div>
    </nav>

    <div class="home-container" style="display: flex; justify-content: center; align-items: center; min-height: calc(100vh - 150px);">
        <div class="admin-form-container" style="text-align: center; max-width: 500px;">
            <h2 id="reg-contest-title">Loading Contest...</h2>
            <p id="reg-contest-id" style="color: #23a2f6; font-family: monospace;"></p>
            <p style="margin-bottom: 40px;">Would you like to register for this contest? You will be able to submit solutions once it starts.</p>
            
            <div style="display: flex; gap: 20px;">
                <button class="btn btn-outline" onclick="window.location.href='index.html'" style="margin-top:0;">Cancel</button>
                <button class="btn" id="confirm-reg-btn" style="margin-top:0;">
                    <span>Confirm Registration</span>
                    <div class="loader"></div>
                </button>
            </div>
            
            <div class="message" id="registration-status-message"></div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
